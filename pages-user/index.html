<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Cloudflare WebDAV</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="login-view" id="login-view" aria-labelledby="login-title">
        <div class="brand-block">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M4 7.5A2.5 2.5 0 0 1 6.5 5h4.2l2 2H18a2.5 2.5 0 0 1 2.5 2.5v7A2.5 2.5 0 0 1 18 19H6.5A2.5 2.5 0 0 1 4 16.5v-9Z" />
              <path d="M7 12h10" />
            </svg>
          </div>
          <div>
            <p class="eyebrow">Cloudflare WebDAV</p>
            <h1 id="login-title">统一登录</h1>
            <p class="muted">管理员和普通用户使用同一个入口登录。</p>
          </div>
        </div>

        <form class="login-panel" id="login-form">
          <label for="login-username">用户名</label>
          <input id="login-username" name="username" autocomplete="username" required />

          <label for="login-password">密码</label>
          <input id="login-password" name="password" type="password" autocomplete="current-password" required />

          <button class="primary-button" type="submit">
            <span>登录</span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 12h13" />
              <path d="m13 6 6 6-6 6" />
            </svg>
          </button>
        </form>
      </section>

      <section class="admin-view hidden" id="admin-view" aria-labelledby="admin-title">
        <header class="topbar">
          <div>
            <p class="eyebrow">Admin</p>
            <h1 id="admin-title">用户管理</h1>
          </div>
          <div class="topbar-actions">
            <button class="ghost-button" id="refresh-users" type="button">刷新</button>
            <button class="ghost-button" id="admin-logout-button" type="button">退出</button>
          </div>
        </header>

        <section class="toolbar admin-toolbar" aria-label="新增用户">
          <form class="admin-form" id="create-user-form">
            <input id="new-username" name="username" placeholder="用户名" autocomplete="off" minlength="3" maxlength="64" required />
            <input id="new-password" name="password" placeholder="初始密码" type="password" minlength="8" required />
            <select id="new-role" name="role">
              <option value="user">普通用户</option>
              <option value="admin">管理员</option>
            </select>
            <button class="primary-button inline" type="submit">新增用户</button>
          </form>
        </section>

        <section class="file-section" aria-labelledby="admin-users-title">
          <div class="section-heading row-heading">
            <div>
              <h2 id="admin-users-title">用户列表</h2>
              <p class="muted">管理员可以新增用户、禁用用户、重置密码。</p>
            </div>
            <label class="search-field">
              <span class="sr-only">搜索用户</span>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m21 21-4.35-4.35" />
                <circle cx="11" cy="11" r="7" />
              </svg>
              <input id="user-search" placeholder="搜索用户" autocomplete="off" />
            </label>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>用户名</th>
                  <th>角色</th>
                  <th>状态</th>
                  <th>更新时间</th>
                  <th class="action-col">操作</th>
                </tr>
              </thead>
              <tbody id="user-list"></tbody>
            </table>
            <div class="empty-state hidden" id="user-empty-state">
              <p>暂无用户</p>
            </div>
          </div>
        </section>
      </section>

      <section class="files-view hidden" id="files-view" aria-labelledby="files-title">
        <header class="topbar">
          <div>
            <p class="eyebrow">Files</p>
            <h1 id="files-title">我的文件</h1>
            <nav class="breadcrumbs" id="breadcrumbs" aria-label="当前位置"></nav>
          </div>
          <div class="topbar-actions">
            <button class="ghost-button" id="refresh-files" type="button">刷新</button>
            <button class="ghost-button" id="user-logout-button" type="button">退出</button>
          </div>
        </header>

        <section class="toolbar" aria-label="文件操作">
          <label class="upload-button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 16V4" />
              <path d="m7 9 5-5 5 5" />
              <path d="M5 20h14" />
            </svg>
            <span>上传文件</span>
            <input id="file-input" type="file" multiple />
          </label>
          <form class="folder-form" id="folder-form">
            <input id="folder-name" name="folderName" placeholder="新建文件夹名称" autocomplete="off" />
            <button class="primary-button inline" type="submit">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14" />
                <path d="M5 12h14" />
              </svg>
              <span>新建文件夹</span>
            </button>
          </form>
        </section>

        <section class="file-section" aria-labelledby="file-list-title">
          <div class="section-heading row-heading">
            <div>
              <h2 id="file-list-title">文件列表</h2>
              <p class="muted">支持浏览、上传、下载、新建文件夹和删除。</p>
            </div>
            <label class="search-field">
              <span class="sr-only">搜索文件</span>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m21 21-4.35-4.35" />
                <circle cx="11" cy="11" r="7" />
              </svg>
              <input id="file-search" placeholder="搜索当前目录" autocomplete="off" />
            </label>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>名称</th>
                  <th>类型</th>
                  <th>大小</th>
                  <th>修改时间</th>
                  <th class="action-col">操作</th>
                </tr>
              </thead>
              <tbody id="file-list"></tbody>
            </table>
            <div class="empty-state hidden" id="empty-state">
              <p>当前目录为空</p>
            </div>
          </div>
        </section>
      </section>
    </main>

    <div class="toast hidden" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js" defer></script>
  </body>
</html>
