<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Cloudflare WebDAV 管理后台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="login-view" id="login-view" aria-labelledby="login-title">
        <div class="brand-block">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img">
              <path d="M4 8.4 12 4l8 4.4v7.2L12 20l-8-4.4V8.4Z" />
              <path d="M8.2 10.1 12 8l3.8 2.1v3.8L12 16l-3.8-2.1v-3.8Z" />
            </svg>
          </div>
          <div>
            <p class="eyebrow">Cloudflare WebDAV</p>
            <h1 id="login-title">管理后台</h1>
            <p class="muted">使用 Cloudflare 变量与密钥中配置的管理员账号登录。</p>
          </div>
        </div>

        <form class="login-panel" id="login-form">
          <label for="login-username">管理员用户名</label>
          <input id="login-username" name="username" autocomplete="username" required />

          <label for="login-password">管理员密码</label>
          <input id="login-password" name="password" type="password" autocomplete="current-password" required />

          <button class="primary-button" type="submit">
            <span>登录</span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 12h13" />
              <path d="m13 6 6 6-6 6" />
            </svg>
          </button>
        </form>
      </section>

      <section class="dashboard-view hidden" id="dashboard-view" aria-labelledby="dashboard-title">
        <header class="topbar">
          <div>
            <p class="eyebrow">Cloudflare WebDAV</p>
            <h1 id="dashboard-title">用户管理</h1>
          </div>
          <div class="topbar-actions">
            <button class="ghost-button" id="refresh-users" type="button" title="刷新用户列表">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 12a9 9 0 0 1-15.6 6.1" />
                <path d="M3 12A9 9 0 0 1 18.6 5.9" />
                <path d="M3 18v-5h5" />
                <path d="M21 6v5h-5" />
              </svg>
              <span>刷新</span>
            </button>
            <button class="ghost-button" id="logout-button" type="button" title="退出登录">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <path d="M16 17l5-5-5-5" />
                <path d="M21 12H9" />
              </svg>
              <span>退出</span>
            </button>
          </div>
        </header>

        <section class="summary-grid" aria-label="用户状态概览">
          <div class="metric">
            <span class="metric-label">全部用户</span>
            <strong id="metric-total">0</strong>
          </div>
          <div class="metric">
            <span class="metric-label">已启用</span>
            <strong id="metric-enabled">0</strong>
          </div>
          <div class="metric">
            <span class="metric-label">已禁用</span>
            <strong id="metric-disabled">0</strong>
          </div>
        </section>

        <section class="workspace">
          <form class="create-user" id="create-user-form" aria-labelledby="create-user-title">
            <div class="section-heading">
              <h2 id="create-user-title">新增用户</h2>
              <p class="muted">新用户将通过 WebDAV Basic Auth 访问自己的文件空间。</p>
            </div>

            <div class="field-grid">
              <label>
                <span>用户名</span>
                <input id="new-username" name="username" autocomplete="off" minlength="3" maxlength="64" required />
              </label>
              <label>
                <span>初始密码</span>
                <input id="new-password" name="password" type="password" minlength="8" required />
              </label>
              <label>
                <span>角色</span>
                <select id="new-role" name="role">
                  <option value="user">普通用户</option>
                  <option value="admin">管理员</option>
                </select>
              </label>
            </div>

            <button class="primary-button" type="submit">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14" />
                <path d="M5 12h14" />
              </svg>
              <span>新增用户</span>
            </button>
          </form>

          <section class="user-section" aria-labelledby="user-list-title">
            <div class="section-heading row-heading">
              <div>
                <h2 id="user-list-title">用户列表</h2>
                <p class="muted">启用状态和密码重置会立即影响 WebDAV 登录。</p>
              </div>
              <label class="search-field">
                <span class="sr-only">搜索用户</span>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m21 21-4.35-4.35" />
                  <circle cx="11" cy="11" r="7" />
                </svg>
                <input id="user-search" placeholder="搜索用户名" autocomplete="off" />
              </label>
            </div>

            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>用户名</th>
                    <th>角色</th>
                    <th>状态</th>
                    <th>更新时间</th>
                    <th class="action-col">操作</th>
                  </tr>
                </thead>
                <tbody id="user-list"></tbody>
              </table>
              <div class="empty-state hidden" id="empty-state">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v11a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 17.5v-11Z" />
                  <path d="M8 9h8" />
                  <path d="M8 13h5" />
                </svg>
                <p>暂无用户</p>
              </div>
            </div>
          </section>
        </section>
      </section>
    </main>

    <div class="toast hidden" id="toast" role="status" aria-live="polite"></div>

    <dialog class="password-dialog" id="password-dialog">
      <form method="dialog" id="password-form">
        <div class="section-heading">
          <h2>重置密码</h2>
          <p class="muted" id="password-dialog-user"></p>
        </div>
        <label>
          <span>新密码</span>
          <input id="reset-password" type="password" minlength="8" required />
        </label>
        <div class="dialog-actions">
          <button class="ghost-button" value="cancel" type="button" id="cancel-reset">取消</button>
          <button class="primary-button" value="confirm" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <script src="./app.js" defer></script>
  </body>
</html>
